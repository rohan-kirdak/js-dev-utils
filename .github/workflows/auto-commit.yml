name: 🟩 Daily Dev Commits

on:
  schedule:
    - cron: "0 4 * * *"   # Base trigger ~9:30 AM IST (random sleep inside adds variation)

  workflow_dispatch:        # Manual trigger from GitHub UI anytime

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: 🤖 Run update script (handles all commits internally)
        run: node auto-update.js

      - name: 📤 Push all commits
        run: git push
